name: Build Kernel v6.15 tarball

on:
  workflow_dispatch:
  push:
jobs:
  create_tar:
    name: Generate custom kernel tarball
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/master
      - name: Pack kernel
        run: |
             wget https://github.com/mj22226/linux/archive/master.tar.gz
             tar -xf master.tar.gz
             mv linux-master linux-6.15
             tar -c linux-6.15 | xz -T0 > linux-6.15.tar.xz
             sha256sum linux-6.15.tar.xz > linux-6.15.sha256sum
             echo "DATE=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
             echo "HASH=$(git log -1 --format="%H")" >> $GITHUB_ENV
      - name: Delete tag
        run: gh release delete v6.15 --cleanup-tag || true
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Release build artifacts
        uses: ncipollo/release-action@v1.14.0
        with:
          commit: ${{ env.HASH }}
          name: Linux 6.15 ${{ env.DATE }}
          allowUpdates: true
          prerelease: false
          replacesArtifacts: true
          tag: v6.15
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
                    *.xz
                    *.sha256sum
