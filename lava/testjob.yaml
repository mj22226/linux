{{ #if job.LAVA_TEST_KSELFTEST_DT }}
  - test:
      definitions:
      - from: git
        name: kselftest-dt
        parameters:
          ENV: ''
          SKIPFILE: /dev/null
          SKIP_INSTALL: true
          TESTPROG_URL: "{{job.CI_PROJECT_URL}}/-/jobs/%%KSELFTEST_BUILD_JOB%%/artifacts/raw/artifacts/kselftest.tar.gz"
          TST_CASENAME: ''
          TST_CMDFILES: dt
        path: automated/linux/kselftest/kselftest.yaml
        repository: https://github.com/kernelci/test-definitions.git
        revision: kernelci.org
      timeout:
        minutes: 10
{{ /if }}
{{ #if job.LAVA_TEST_WATCHDOG }}
  - test:
      timeout:
        minutes: 5
      interactive:
      - name: wdt-reset
        prompts: ['root@rk3588-ci:(.*)#']
        script:
        - name: wdt-get-timeout
          command: "wdt_timeout=$(cat /sys/class/watchdog/watchdog0/timeout)"
          wait_for_prompt: true
          failures:
          - message: "cat: /sys/class/watchdog/watchdog\\d+/timeout: No such file or directory"
            exception: JobError
        - name: wdt-trigger-reset
          command: "sleep $((wdt_timeout + 5)) > /dev/watchdog0"
          wait_for_prompt: false
          successes:
          - message: U-Boot
{{ /if }}
{{ #if job.LAVA_TEST_RTCWAKE }}
  - test:
      definitions:
      - from: git
        name: rtcwake
        parameters:
          ITERATIONS: 3
          SECONDS: 120
          DELTA: 70
        path: rtcwake/rtcwake.yaml
        repository: https://gitlab.collabora.com/hardware-enablement/common/lava-test-definitions.git
        revision: main
      timeout:
        minutes: 10
{{ /if }}
{{ #if job.LAVA_TEST_PM_TEST_SUSPEND }}
  - test:
      timeout:
        minutes: 5
      interactive:
      - name: pm-test-suspend
        prompts: ['root@rk3588-ci:(.*)#']
        script:
        - name: keep-console-enabled
          command: "echo N > /sys/module/printk/parameters/console_suspend"
          wait_for_prompt: true
        - name: print-pm-times
          command: "echo 1 > /sys/power/pm_print_times"
          wait_for_prompt: true
        - name: print-pm-debug-messages
          command: "echo 1 > /sys/power/pm_debug_messages"
          wait_for_prompt: true
        - name: do-pm-test
          command: "echo core > /sys/power/pm_test"
          wait_for_prompt: true
        - name: suspend-for-5s
          command: "echo mem > /sys/power/state"
          wait_for_prompt: true
{{ /if }}
{{ #if job.LAVA_TEST_PM_TEST_SUSPEND_DEEP }}
  - test:
      timeout:
        minutes: 5
      interactive:
      - name: pm-test-suspend-deep
        prompts: ['root@rk3588-ci:(.*)#']
        script:
        - name: keep-console-enabled
          command: "echo N > /sys/module/printk/parameters/console_suspend"
          wait_for_prompt: true
        - name: print-pm-times
          command: "echo 1 > /sys/power/pm_print_times"
          wait_for_prompt: true
        - name: print-pm-debug-messages
          command: "echo 1 > /sys/power/pm_debug_messages"
          wait_for_prompt: true
        - name: do-pm-test
          command: "echo none > /sys/power/pm_test"
          wait_for_prompt: true
        - name: suspend-for-120s
          command: "rtcwake -m mem -s 120"
          wait_for_prompt: true
{{ /if }}
